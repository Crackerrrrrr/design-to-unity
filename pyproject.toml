[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "funplay-lanhu-game-mcp"
version = "0.1.0"
description = "MCP server that turns Lanhu design pages into platform-neutral design handoff packets."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "fastmcp>=2.0.0",
  "httpx>=0.27.0",
  "python-dotenv>=1.0.0"
]

[project.scripts]
FunPlayLanhuGameMcp = "design_handoff_mcp.server:main"
funplay-lanhu-game-mcp = "design_handoff_mcp.server:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
