<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Design to Unity</title>
    <script src="index.js"></script>
    <style>
      body {
        margin: 0;
        padding: 16px;
        color: var(--uxp-host-text-color);
        background: var(--uxp-host-background-color);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 18px;
        font-weight: 600;
      }

      button {
        min-height: 32px;
      }

      label {
        display: flex;
        gap: 8px;
        align-items: center;
        font-size: 12px;
      }

      .path {
        min-height: 18px;
        overflow-wrap: anywhere;
        opacity: 0.85;
        font-size: 12px;
      }

      pre {
        min-height: 160px;
        max-height: 320px;
        overflow: auto;
        padding: 10px;
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.18);
        white-space: pre-wrap;
        font-size: 11px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Design to Unity</h1>
      <button id="chooseFolderBtn">Choose Export Folder</button>
      <button id="exportBtn" disabled>Export Active Document</button>
      <label>
        <input id="rasterComplexGroups" type="checkbox" checked />
        Rasterize complex groups
      </label>
      <div id="folderLabel" class="path">No export folder selected.</div>
      <pre id="status">Ready.</pre>
    </main>
  </body>
</html>
