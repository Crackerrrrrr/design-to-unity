<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: Inter, Arial, sans-serif;
        color: #1f2933;
      }
      button {
        width: 100%;
        height: 36px;
        border: 0;
        border-radius: 6px;
        background: #2563eb;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.55;
        cursor: default;
      }
      #status {
        margin-top: 12px;
        font-size: 12px;
        line-height: 1.45;
        color: #52616f;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <button id="export">Export Current Selection</button>
    <div id="status">Select one frame/component or leave nothing selected to export the current page.</div>
    <script>
      const button = document.getElementById("export");
      const status = document.getElementById("status");

      button.onclick = () => {
        button.disabled = true;
        status.textContent = "Exporting Figma data...";
        parent.postMessage({ pluginMessage: { type: "export" } }, "*");
      };

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;
        if (message.type === "status") {
          status.textContent = message.message;
          return;
        }
        if (message.type === "error") {
          button.disabled = false;
          status.textContent = message.message || "Export failed.";
          return;
        }
        if (message.type === "download") {
          const blob = new Blob([JSON.stringify(message.manifest, null, 2)], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = message.fileName || "figma-design-to-unity-export.json";
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
          button.disabled = false;
          status.textContent = `Exported ${message.assetCount || 0} assets. Use figma_design_prepare_export_packet with the downloaded JSON.`;
        }
      };
    </script>
  </body>
</html>
